<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Exam Prep</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Auth Screen -->
    <div id="screen-auth" class="screen active">
      <div class="gradient-orb orb-1"></div>
      <div class="gradient-orb orb-2"></div>
      <div class="gradient-orb orb-3"></div>
      <div class="gradient-orb orb-4"></div>
      <div class="gradient-orb orb-5"></div>
      <div class="auth-container">
        <div class="auth-card">
          <h1 class="auth-title">AP Exam Prep</h1>
          <p class="auth-subtitle">Enter your email to start practicing</p>

          <div id="auth-error" class="auth-error hidden"></div>

          <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="auth-field">
              <label for="auth-email">Email</label>
              <input type="email" id="auth-email" placeholder="you@school.edu" autocomplete="email" required>
            </div>
            <button type="submit" class="auth-submit" id="auth-submit">Continue</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Course Selection Screen -->
    <div id="screen-home" class="screen">
      <div class="gradient-orb orb-1"></div>
      <div class="gradient-orb orb-2"></div>
      <div class="gradient-orb orb-3"></div>
      <div class="gradient-orb orb-4"></div>
      <div class="gradient-orb orb-5"></div>
      <button class="sign-out-btn" onclick="logout()">Sign Out</button>
      <div class="home-container">
        <div class="hero">
          <h1>AP Exam Prep</h1>
          <p class="subtitle">Randomized practice questions to keep you sharp</p>
        </div>
        <div class="course-grid">
          <button class="course-card" data-course="ap-geo" onclick="selectCourse('ap-geo')">
            <h2>AP Human Geography</h2>
            <p class="course-desc">Population, culture, political organization, agriculture, urbanization, and industrialization</p>
          </button>
          <button class="course-card" data-course="ap-world" onclick="selectCourse('ap-world')">
            <h2>AP World History</h2>
            <p class="course-desc">Global interactions from 1200 CE to the present across civilizations and eras</p>
          </button>
          <button class="course-card" data-course="apush" onclick="selectCourse('apush')">
            <h2>AP U.S. History</h2>
            <p class="course-desc">American history from pre-Columbian societies through the modern era</p>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading Screen -->
    <div id="screen-loading" class="screen">
      <div class="loading-container">
        <div class="spinner"></div>
        <p id="loading-message">Loading questions...</p>
      </div>
    </div>

    <!-- Error Screen -->
    <div id="screen-error" class="screen">
      <div class="error-container">
        <div class="error-icon">!</div>
        <h2>Something went wrong</h2>
        <p id="error-message"></p>
        <button class="btn-primary" onclick="goHome()">Back to Courses</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
      <!-- Header Bar (dark, matching CB exam) -->
      <div class="exam-header">
        <div class="exam-header-left">
          <button class="exam-hdr-btn" onclick="goHome()">
            Directions
            <svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="exam-header-center">
          <span id="course-label" class="exam-header-label">Multiple Choice</span>
        </div>
        <div class="exam-header-right">
          <button class="exam-hdr-btn" id="btn-highlight" onclick="toggleHighlightMode()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Highlight
          </button>
          <button class="exam-hdr-btn" id="btn-notes" onclick="toggleNotesPanel()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Notes
          </button>
        </div>
      </div>

      <!-- Split Panel Body -->
      <div class="exam-body-wrapper">
        <div class="exam-body">
          <!-- Left: Stimulus -->
          <div class="exam-left" id="exam-left">
            <div class="exam-stimulus-scroll" id="stimulus-container"></div>
          </div>

          <!-- Draggable Divider -->
          <div class="exam-divider" id="exam-divider">
            <div class="exam-divider-handle">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>

          <!-- Right: Question -->
          <div class="exam-right" id="exam-right">
            <div class="exam-question-scroll">
              <div class="exam-question-header">
                <span class="exam-q-badge" id="exam-q-badge">1</span>
              </div>

              <div class="exam-question-body">
                <h2 class="question-text" id="question-text"></h2>
                <div class="options-list" id="options-list"></div>

                <div class="explanation-box hidden" id="explanation-box">
                  <div class="explanation-icon" id="explanation-icon"></div>
                  <p id="explanation-text"></p>
                </div>

                <button class="btn-next-inline hidden" id="btn-next-inline" onclick="nextQuestion()">
                  Next Question
                  <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M7.5 5L12.5 10L7.5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Notes Panel -->
        <div class="notes-panel hidden" id="notes-panel">
          <div class="notes-header">
            <span class="notes-title">Notes</span>
            <button class="notes-close" onclick="toggleNotesPanel()">&times;</button>
          </div>
          <textarea class="notes-textarea" id="notes-textarea" placeholder="Type your notes here..."></textarea>
        </div>
      </div>

      <div class="exam-footer"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
